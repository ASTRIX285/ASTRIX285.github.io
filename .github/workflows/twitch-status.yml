name: Update Twitch Status

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check-twitch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check Twitch status and fetch VOD
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
        run: |
          python3 - << 'PYEOF'
          import json, urllib.request, urllib.parse, os, sys

          CLIENT_ID     = os.environ['TWITCH_CLIENT_ID']
          CLIENT_SECRET = os.environ['TWITCH_CLIENT_SECRET']

          def api(url, token=None):
              req = urllib.request.Request(url)
              if token:
                  req.add_header('Client-ID', CLIENT_ID)
                  req.add_header('Authorization', f'Bearer {token}')
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          def post(url, data):
              encoded = urllib.parse.urlencode(data).encode()
              req = urllib.request.Request(url, data=encoded, method='POST')
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          # Step 1 — Get token
          try:
              tok = post('https://id.twitch.tv/oauth2/token', {
                  'client_id': CLIENT_ID,
                  'client_secret': CLIENT_SECRET,
                  'grant_type': 'client_credentials'
              })
              token = tok['access_token']
              print('Token OK')
          except Exception as e:
              print(f'Auth failed: {e}', file=sys.stderr)
              sys.exit(1)

          # Step 2 — Get user_id
          users = api('https://api.twitch.tv/helix/users?login=astrix285x', token)
          user_id = users['data'][0]['id'] if users.get('data') else ''
          print(f'User ID: {user_id}')

          # Step 3 — Check if live
          streams = api('https://api.twitch.tv/helix/streams?user_login=astrix285x', token)
          is_live = len(streams.get('data', [])) > 0

          result = {'live': is_live}

          if is_live:
              s = streams['data'][0]
              result['title']   = s.get('title', '')
              result['game']    = s.get('game_name', '')
              result['viewers'] = s.get('viewer_count', 0)
              print(f'LIVE: {result["title"]}')
          else:
              # Step 4 — Fetch latest VOD
              vods = api(f'https://api.twitch.tv/helix/videos?user_id={user_id}&type=archive&first=1', token)
              if vods.get('data'):
                  v = vods['data'][0]
                  result['vod_id']    = v.get('id', '')
                  result['vod_title'] = v.get('title', '')
                  result['vod_url']   = v.get('url', '')
                  print(f'VOD: {result["vod_title"]}')
              else:
                  print('No VODs found')

          with open('twitch-status.json', 'w') as f:
              json.dump(result, f)
          print('Done:', result)
          PYEOF

      - name: Commit status file
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add twitch-status.json
          git diff --cached --quiet || git commit -m "Update Twitch status"
          git push
