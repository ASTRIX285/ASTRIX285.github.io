name: Update Twitch Status

on:
  schedule:
    - cron: '*/5 * * * *'   # runs every 5 minutes
  workflow_dispatch:          # allows manual trigger

jobs:
  check-twitch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check Twitch live status and fetch latest VOD
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
        run: |
          # Step 1 — Get access token
          TOKEN=$(curl -s -X POST "https://id.twitch.tv/oauth2/token" \
            -d "client_id=${TWITCH_CLIENT_ID}&client_secret=${TWITCH_CLIENT_SECRET}&grant_type=client_credentials" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")

          # Step 2 — Get numeric user_id for astrix285x (required for VOD lookup)
          USER_RESPONSE=$(curl -s \
            -H "Client-ID: ${TWITCH_CLIENT_ID}" \
            -H "Authorization: Bearer ${TOKEN}" \
            "https://api.twitch.tv/helix/users?login=astrix285x")

          USER_ID=$(echo "$USER_RESPONSE" | python3 -c \
            "import sys,json; d=json.load(sys.stdin)['data']; print(d[0]['id'] if d else '')")

          # Step 3 — Check if live
          STREAM_RESPONSE=$(curl -s \
            -H "Client-ID: ${TWITCH_CLIENT_ID}" \
            -H "Authorization: Bearer ${TOKEN}" \
            "https://api.twitch.tv/helix/streams?user_login=astrix285x")

          # Step 4 — Fetch latest VOD using numeric user_id
          VOD_RESPONSE=$(curl -s \
            -H "Client-ID: ${TWITCH_CLIENT_ID}" \
            -H "Authorization: Bearer ${TOKEN}" \
            "https://api.twitch.tv/helix/videos?user_id=${USER_ID}&type=archive&first=1")

          # Step 5 — Write twitch-status.json (no secrets ever included)
          python3 -c "
          import json

          stream = json.loads('''${STREAM_RESPONSE}''')
          vod    = json.loads('''${VOD_RESPONSE}''')

          is_live = len(stream.get('data', [])) > 0
          result  = {'live': is_live}

          if is_live:
              s = stream['data'][0]
              result['title']   = s.get('title', '')
              result['game']    = s.get('game_name', '')
              result['viewers'] = s.get('viewer_count', 0)
          else:
              vods = vod.get('data', [])
              if vods:
                  v = vods[0]
                  result['vod_id']    = v.get('id', '')
                  result['vod_title'] = v.get('title', '')
                  result['vod_url']   = v.get('url', '')

          with open('twitch-status.json', 'w') as f:
              json.dump(result, f)
          print('Status written — live:', is_live)
          "

      - name: Commit status file
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add twitch-status.json
          git diff --cached --quiet || git commit -m "Update Twitch status"
          git push
