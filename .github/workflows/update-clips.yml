name: Update Clips Page

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-clips:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run clips builder
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python3 scripts/build_clips.py

      - name: Commit updated clips page
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add pages/clips.html
          git diff --cached --quiet || git commit -m "Auto-update clips [$(date -u '+%H:%M UTC')]"
          git push
