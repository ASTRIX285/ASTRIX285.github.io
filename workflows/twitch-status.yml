name: Update Twitch Status

on:
  schedule:
    - cron: '*/5 * * * *'   # runs every 5 minutes
  workflow_dispatch:          # allows manual trigger

jobs:
  check-twitch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check Twitch live status
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
        run: |
          # Get access token
          TOKEN=$(curl -s -X POST "https://id.twitch.tv/oauth2/token" \
            -d "client_id=${TWITCH_CLIENT_ID}&client_secret=${TWITCH_CLIENT_SECRET}&grant_type=client_credentials" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")

          # Check if live
          RESPONSE=$(curl -s -H "Client-ID: ${TWITCH_CLIENT_ID}" \
            -H "Authorization: Bearer ${TOKEN}" \
            "https://api.twitch.tv/helix/streams?user_login=astrix285x")

          # Check for VOD if offline
          VOD_RESPONSE=$(curl -s -H "Client-ID: ${TWITCH_CLIENT_ID}" \
            -H "Authorization: Bearer ${TOKEN}" \
            "https://api.twitch.tv/helix/videos?user_login=astrix285x&type=archive&first=1")

          # Write status JSON (no secrets included)
          python3 -c "
          import json, sys

          stream = json.loads('''${RESPONSE}''')
          vod = json.loads('''${VOD_RESPONSE}''')

          is_live = len(stream.get('data', [])) > 0
          result = {'live': is_live}

          if is_live:
              s = stream['data'][0]
              result['title'] = s.get('title', '')
              result['game'] = s.get('game_name', '')
              result['viewers'] = s.get('viewer_count', 0)
          else:
              vods = vod.get('data', [])
              if vods:
                  v = vods[0]
                  result['vod_id'] = v.get('id', '')
                  result['vod_title'] = v.get('title', '')
                  result['vod_url'] = v.get('url', '')

          with open('twitch-status.json', 'w') as f:
              json.dump(result, f)
          "

      - name: Commit status file
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add twitch-status.json
          git diff --cached --quiet || git commit -m "Update Twitch status"
          git push
